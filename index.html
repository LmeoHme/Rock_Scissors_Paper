<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <script type="module" src="index.js"></script>
</head>
<body>
    <h1 id="head-title" class="title">Rock - Scissors - Paper Game</h1>

    <div id="instructions" class="panel">
        <h3>Instrucions:</h3>
        <ol>
            <li>1. Choose one of three selecions below.</li>
            <li>2. Win 1 time gain you 1 score.</li>
            <li>3. Win 3 times to get the final win. Good luck.</li>
        </ol>
    </div>
    
    <div id="choice-container" class="choices"> 
        <img id="rock" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/The_Rock_2023.jpg/500px-The_Rock_2023.jpg?_=20231201054658" alt="Rock">
        <img id="scissors" src="https://tr.rbxcdn.com/180DAY-bcce01eca9d9605ece04fdaddaab8918/420/420/BackAccessory/Webp/noFilter" alt="Scissors">
        <img id="paper" src="https://media.istockphoto.com/id/497493038/photo/hand-with-money.jpg?s=170667a&w=0&k=20&c=Rz732W3ptRZMcY9gR3jKOamQGOqNEz0QRTH-gKbbHM0=" alt="Paper">
    </div>

    <div id="result" class="ui">
        <p class="choices-ui"></p>
        <p class="player-score-ui"></p>
        <p class="computer-score-ui"></p>
        <p class="announcement"></p>
    </div>

    <div id="final-announcement" class="overlay">
        <div class="container">
            <h2 id="final-winner"></h2>
            <p id="rematch-promotion"></p>
            <div class="buttons">
                <button id="accept-button"></button>
                <button id="unaccept-button"></button>
            </div>
        </div>
    </div>
</body>
</html>
